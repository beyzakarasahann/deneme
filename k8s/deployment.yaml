apiVersion: apps/v1
kind: Deployment
metadata:
  name: atelier-site
  labels:
    app: atelier-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atelier-site
  template:
    metadata:
      labels:
        app: atelier-site
    spec:
      containers:
        - name: atelier-site
          image: ghcr.io/beyzakarasahann/deneme:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
